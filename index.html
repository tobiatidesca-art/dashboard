        function runAnalysis() {
            const thr = parseFloat(document.getElementById('threshold').value) / 100;
            let currentCap = 20000;
            let pnlSum = 0; let trades = 0; let wins = 0;
            let chartData = []; let labels = [];
            let tableHTML = "";

            // Reset dati
            rawData.forEach((item, index) => {
                let sig = 0;
                if (item.m > thr && item.v < 25) sig = 1;
                else if (item.m < -thr && item.v < 32) sig = -1;

                if (sig !== 0) {
                    const tradePnL = sig * item.p;
                    pnlSum += tradePnL;
                    currentCap += tradePnL;
                    trades++;
                    if (tradePnL > 0) wins++;

                    // Aggiungi alla tabella (solo ultimi 20 per velocità)
                    if (tableHTML.split('<tr>').length < 22) {
                        tableHTML += `<tr>
                            <td>${item.d}</td>
                            <td><span class="badge ${sig===1?'bg-success':'bg-danger'}">${sig===1?'LONG':'SHORT'}</span></td>
                            <td style="color:${tradePnL>=0?'#02c076':'#f84960'}">${tradePnL.toFixed(2)} €</td>
                            <td>${(item.m*100).toFixed(2)}%</td>
                            <td>${item.v.toFixed(1)}</td>
                        </tr>`;
                    }
                }
                // Dati grafico (prendiamo un campione ogni 2 trade o tutti)
                if (index % 1 === 0) {
                    chartData.push(currentCap);
                    labels.push(item.d);
                }
            });

            // Aggiorna UI
            document.getElementById('resPnL').innerText = pnlSum.toFixed(0) + " €";
            document.getElementById('resTrades').innerText = trades;
            document.getElementById('resWin').innerText = trades > 0 ? ((wins/trades)*100).toFixed(1) + "%" : "0%";
            document.getElementById('tableBody').innerHTML = tableHTML;

            updateChart(labels, chartData);
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Equity Curve (€)',
                        data: data,
                        borderColor: '#00d4ff',
                        borderWidth: 2,
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { grid: { color: '#2d3139' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = runAnalysis;
