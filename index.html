        function runAnalysis() {
            const thr = parseFloat(document.getElementById('threshold').value) / 100;
            
            function calcEquity(dataset) {
                let cap = 20000; let pnl = 0; let wins = 0; let n = 0; let equity = [];
                dataset.forEach(i => {
                    let sig = 0;
                    if (i.m > thr && i.v < 25) sig = 1; else if (i.m < -thr && i.v < 32) sig = -1;
                    if (sig !== 0) {
                        let t = sig * i.p; pnl += t; cap += t; n++; if (t > 0) wins++;
                    }
                    equity.push(cap);
                });
                return { equity, pnl, wr: n>0?(wins/n*100):0, n };
            }

            const resP = calcEquity(dataP);
            const resD = calcEquity(dataD);

            // Update KPI (basati su Precise)
            document.getElementById('statsPrecise').innerHTML = `
                <div class="col-6"><div class="stat-card"><span class="stat-label">Net Pnl</span><span class="stat-value">${resP.pnl.toFixed(0)}€</span></div></div>
                <div class="col-6"><div class="stat-card"><span class="stat-label">Trades</span><span class="stat-value">${resP.n}</span></div></div>
                <div class="col-6"><div class="stat-card"><span class="stat-label">Win Rate</span><span class="stat-value">${resP.wr.toFixed(1)}%</span></div></div>
                <div class="col-6"><div class="stat-card"><span class="stat-label">Profit/Tr</span><span class="stat-value">${resP.n>0?(resP.pnl/resP.n).toFixed(0):0}€</span></div></div>
            `;

            updateChart('chartPrecise', dataP.map(x=>x.d), resP.equity, '#3b82f6', true);
            updateChart('chartDaily', dataD.map(x=>x.d), resD.equity, '#6b7280', false);
        }

        function updateChart(id, labels, data, color, isP) {
            const ctx = document.getElementById(id).getContext('2d');
            if (isP && chrtP) chrtP.destroy(); if (!isP && chrtD) chrtD.destroy();
            const c = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Equity', data: data, borderColor: color, borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: color+'1a' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false } } }
            });
            if (isP) chrtP = c; else chrtD = c;
        }
        window.onload = runAnalysis;
